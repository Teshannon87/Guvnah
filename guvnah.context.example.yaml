server:
  host: "127.0.0.1"
  port: 8791

upstream:
  # Set to your RelayPlane endpoint, or the OpenAI/Anthropic OpenAI-compatible endpoint directly.
  base_url: "http://localhost:8787/v1"
  api_key_env: "UPSTREAM_API_KEY"
  # If false, Guvnah uses the API key from `api_key_env`. If true, Guvnah passes the
  # client's Authorization header through to upstream untouched.
  forward_client_auth: false

database:
  path: ".guvnah-context/guvnah-context.sqlite"

mode:
  inspect_only: true
  mutate_prompts: false

logging:
  log_prompts: true
  log_responses: false
  redact_secrets: true
  store_full_prompt: false
  store_prompt_hash: true

token_budgets:
  max_total_prompt_tokens: 20000
  max_system_tokens: 5000
  max_tools_tokens: 4000
  max_memory_tokens: 3000
  max_history_tokens: 6000
  max_tool_output_tokens: 3000

detection:
  repeated_block_min_tokens: 250
  repeated_block_min_occurrences: 2
  oversized_context_tokens: 20000
  large_message_tokens: 5000
  raw_tool_output_tokens: 3000
  cache_prefix_window_tokens: 4000
  unknown_mass_tokens: 4000

# Circuit breaker for Guvnah's own sidecar work (inspection + DB writes).
# Forwarding to upstream is never wrapped — if Guvnah's sidecar work fails
# repeatedly, the breaker opens and Guvnah keeps forwarding requests without
# inspection until the cooldown elapses.
breaker:
  enabled: true
  failure_threshold: 5
  cooldown_ms: 30000

# Per-model pricing for the live cost CLI line and (later) routing scorer.
# Resolution order: overrides > .guvnah-context/openrouter-models.json (if present) > built-in baseline.
# Prices are USD per 1M tokens. Provider prices change; override here if the
# baseline is stale.
pricing:
  use_baseline: true
  use_openrouter_cache: true
  overrides: []
  # Example:
  # overrides:
  #   - model: "gpt-4o"
  #     input_per_mtok: 2.50
  #     output_per_mtok: 10.00

# After each completed request Guvnah prints a one-line cost summary to stdout:
#   🪙 4,820 in / 312 out → $0.0262 (gpt-4o-mini, run=demo-run-1)
#
# When a run goes quiet for `idle_seconds` (no new calls under that run_id),
# Guvnah also auto-prints a 4-line summary aggregating that run's totals and
# top bloat fixes. Sweeper checks every `sweep_interval_seconds`.
notifications:
  cli:
    enabled: true
    coin_emoji: "🪙"
    end_of_run:
      enabled: true
      idle_seconds: 60
      sweep_interval_seconds: 10

categories:
  system:
    role_patterns: ["system", "developer"]
  tools:
    keyword_patterns:
      - "tool"
      - "function"
      - "skill"
      - "available tools"
      - "available skills"
      - "mcp"
  memory:
    keyword_patterns:
      - "memory"
      - "memories"
      - "user profile"
      - "known facts"
      - "saved context"
  history:
    role_patterns: ["user", "assistant"]
  tool_output:
    keyword_patterns:
      - "tool result"
      - "function result"
      - "stdout"
      - "stderr"
      - "stack trace"
      - "html"
      - "json"
